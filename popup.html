<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 12px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      color: #333;
    }
    h3 { margin: 0 0 8px; font-size: 14px; }
    .status { 
      padding: 8px; 
      border-radius: 4px; 
      margin-bottom: 8px;
      font-size: 12px;
    }
    .status.ok { background: #e8f5e9; color: #2e7d32; }
    .status.missing { background: #fff3e0; color: #e65100; }
    .status.disabled { background: #f5f5f5; color: #888; }
    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      background: #1a73e8;
      color: white;
      cursor: pointer;
      font-size: 13px;
      margin-top: 8px;
    }
    .btn:hover { background: #1557b0; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h3>AI Autocomplete ᚱ</h3>
  <div id="status" class="status">Loading…</div>
  <div class="toggle-row">
    <span>Enabled</span>
    <input type="checkbox" id="toggle">
  </div>
  <button class="btn" id="optionsBtn">⚙️ Settings</button>
  <script src="popup.js"></script>
</body>
</html>
