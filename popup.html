<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 12px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a2e;
    }
    h3 { margin: 0 0 8px; font-size: 14px; color: #fff; }
    .status { 
      padding: 8px; 
      border-radius: 4px; 
      margin-bottom: 8px;
      font-size: 12px;
    }
    .status.ok { background: #1a3a2a; color: #4caf50; }
    .status.missing { background: #3a2a1a; color: #ff9800; }
    .status.disabled { background: #2a2a3a; color: #888; }
    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      background: #6b9fff;
      color: #111;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      margin-top: 8px;
    }
    .btn:hover { background: #8bb4ff; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: #ccc;
    }
    input[type="checkbox"] {
      accent-color: #6b9fff;
    }
  </style>
</head>
<body>
  <h3>AI Autocomplete ᚱ</h3>
  <div id="status" class="status">Loading…</div>
  <div class="toggle-row">
    <span>Enabled</span>
    <input type="checkbox" id="toggle">
  </div>
  <button class="btn" id="optionsBtn">⚙️ Settings</button>
  <script src="popup.js"></script>
</body>
</html>
